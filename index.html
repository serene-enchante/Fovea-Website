<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>fovea</title>
    <meta name="description" content="Fovea - Spatial mapping and count circle data engine. Search and access Christmas Bird Count circles.">

    <!-- Fonts & Icons -->
    <link rel="icon" type="image/png" href="images/logo-fav.png">

    <style>
        @font-face {
            font-family: 'Aliceregular';
            src: url('fonts/alice-fontfacekit/web%20fonts/alice_regular_macroman/Alice-Regular-webfont.woff2') format('woff2'),
                 url('fonts/alice-fontfacekit/web%20fonts/alice_regular_macroman/Alice-Regular-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --subtext-color: rgba(255, 255, 255, 0.45);
            --border-color: rgba(255, 255, 255, 0.12);
            --box-bg: rgba(255, 255, 255, 0.05);
            --box-hover-bg: rgba(255, 255, 255, 0.09);
            --accent-green: #30d158;
            --font-serif: 'Aliceregular', 'Alice', Georgia, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .home-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 10;
        }

        /* Ambient Glow Effect */
        .ambient-glow {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(300px, 50vw, 600px);
            height: clamp(300px, 50vw, 600px);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.035) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Logo Title */
        .logo-title {
            font-family: var(--font-serif);
            font-size: clamp(4.5rem, 11vw, 8.5rem);
            font-weight: 400;
            color: var(--text-color);
            text-transform: lowercase;
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 2.25rem;
            user-select: none;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInLogo 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.1s;
        }

        @keyframes fadeInLogo {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Search Form Wrapper */
        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 440px;
            z-index: 20;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInSearch 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.25s;
        }

        @keyframes fadeInSearch {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--box-bg);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            padding: 0.75rem 1.25rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .search-box:focus-within {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.28);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.15);
        }

        .search-icon {
            color: rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
            transition: color 0.2s ease;
        }

        .search-box:focus-within .search-icon {
            color: rgba(255, 255, 255, 0.8);
        }

        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 0.95rem;
            font-family: var(--font-sans);
            font-weight: 400;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .search-clear {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .search-clear:hover {
            color: #ffffff;
        }

        /* Autocomplete Dropdown */
        .autocomplete-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #000000;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.7);
            z-index: 50;
            padding: 0.4rem;
            display: none;
        }

        .autocomplete-item {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.75rem 0.95rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
            text-decoration: none;
            color: inherit;
        }

        .autocomplete-item:hover,
        .autocomplete-item.is-selected {
            background: rgba(255, 255, 255, 0.10);
        }

        .autocomplete-item__icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            color: rgba(255, 255, 255, 0.7);
            flex-shrink: 0;
            transition: color 0.2s ease;
        }

        .autocomplete-item:hover .autocomplete-item__icon {
            color: var(--accent-green);
        }

        .autocomplete-item__info {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            min-width: 0;
        }

        .autocomplete-item__title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .autocomplete-item__subtitle {
            font-size: 0.76rem;
            color: var(--subtext-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-results {
            padding: 1rem;
            text-align: center;
            font-size: 0.84rem;
            color: var(--subtext-color);
        }

        /* Bottom Quick Links Footer */
        .home-footer {
            margin-top: 3rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            opacity: 0;
            animation: fadeInSearch 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s;
        }

        .footer-link {
            font-size: 0.82rem;
            color: var(--subtext-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-link:hover {
            color: #ffffff;
        }

        /* Toast Popup Notification */
        .toast-notification {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 33, 40, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.16);
            color: #ffffff;
            padding: 0.75rem 1.4rem;
            border-radius: 9999px;
            font-size: 0.86rem;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 0.65rem;
            white-space: nowrap;
        }

        .toast-notification.is-visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>
    <div id="toast-notification" class="toast-notification"></div>

    <main class="home-container">
        <h1 class="logo-title">fovea</h1>

        <div class="search-wrapper">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="home-search-input" class="search-input" placeholder="Search count circles (e.g. Eugene, Florence)..." autocomplete="off" spellcheck="false" />
                <button type="button" id="home-search-clear" class="search-clear" aria-label="Clear search" style="display: none;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="home-autocomplete" class="autocomplete-dropdown"></div>
        </div>

        <nav class="home-footer">
            <a href="maps/" class="footer-link">Interactive Map</a>
            <a href="info/" class="footer-link">Information</a>
            <a href="#" class="footer-link" data-coming-soon="Results Data">Results Data</a>
            <a href="#" class="footer-link" data-coming-soon="Directory">Directory</a>
        </nav>
    </main>

    <script>
        const COUNT_CIRCLES_DATA = [
            {
                name: "Eugene",
                title: "Eugene Count Circle",
                subtitle: "Lane County, OR, USA",
                url: "maps/?circle=Eugene",
                logo: "images/logo-small.png",
                hasData: true
            },
            {
                name: "Florence",
                title: "Florence Count Circle",
                subtitle: "Lane County, OR, USA",
                url: "maps/?circle=Florence",
                logo: "images/florence.png",
                hasData: true
            },
            {
                name: "Cottage Grove",
                title: "Cottage Grove Count Circle",
                subtitle: "Lane County, OR, USA",
                url: "maps/?circle=Cottage%20Grove",
                hasData: false
            },
            {
                name: "Oakridge",
                title: "Oakridge Count Circle",
                subtitle: "Lane County, OR, USA",
                url: "maps/?circle=Oakridge",
                hasData: false
            }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("home-search-input");
            const clearBtn = document.getElementById("home-search-clear");
            const dropdown = document.getElementById("home-autocomplete");
            let selectedIndex = -1;

            const renderDropdown = (query) => {
                const q = query.trim().toLowerCase();
                if (!q) {
                    dropdown.style.display = "none";
                    dropdown.innerHTML = "";
                    clearBtn.style.display = "none";
                    selectedIndex = -1;
                    return;
                }

                clearBtn.style.display = "flex";

                const matches = COUNT_CIRCLES_DATA.filter(circle => 
                    circle.name.toLowerCase().includes(q) ||
                    circle.title.toLowerCase().includes(q) ||
                    circle.subtitle.toLowerCase().includes(q)
                );

                if (matches.length === 0) {
                    dropdown.style.display = "block";
                    dropdown.innerHTML = `<div class="no-results">No count circle matching "${q}"</div>`;
                    selectedIndex = -1;
                    return;
                }

                dropdown.style.display = "block";
                dropdown.innerHTML = matches.map((circle, index) => {
                    let iconHtml = "";
                    if (circle.hasData) {
                        iconHtml = `<img src="${circle.logo}" alt="${circle.name}" style="width: 100%; height: 100%; object-fit: contain;" />`;
                    } else {
                        iconHtml = `
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; opacity: 0.5;">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
                            </svg>
                        `;
                    }
                    return `
                        <a href="${circle.url}" class="autocomplete-item" data-index="${index}">
                            <div class="autocomplete-item__icon">
                                ${iconHtml}
                            </div>
                            <div class="autocomplete-item__info">
                                <div class="autocomplete-item__title">${circle.title}</div>
                                <div class="autocomplete-item__subtitle">${circle.subtitle}</div>
                            </div>
                        </a>
                    `;
                }).join("");

                selectedIndex = -1;
            };

            input.addEventListener("input", (e) => {
                renderDropdown(e.target.value);
            });

            input.addEventListener("focus", (e) => {
                if (e.target.value.trim()) {
                    renderDropdown(e.target.value);
                }
            });

            clearBtn.addEventListener("click", () => {
                input.value = "";
                renderDropdown("");
                input.focus();
            });

            document.addEventListener("click", (e) => {
                if (!e.target.closest(".search-wrapper")) {
                    dropdown.style.display = "none";
                }
            });

            // Keyboard Navigation (Arrow keys + Enter)
            input.addEventListener("keydown", (e) => {
                const items = dropdown.querySelectorAll(".autocomplete-item");
                if (items.length === 0) return;

                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    selectedIndex = (selectedIndex + 1) % items.length;
                    highlightItem(items);
                } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    selectedIndex = (selectedIndex - 1 + items.length) % items.length;
                    highlightItem(items);
                } else if (e.key === "Enter") {
                    if (selectedIndex >= 0 && selectedIndex < items.length) {
                        e.preventDefault();
                        items[selectedIndex].click();
                    } else if (items.length > 0) {
                        e.preventDefault();
                        items[0].click();
                    }
                }
            });

            function highlightItem(items) {
                items.forEach((item, index) => {
                    if (index === selectedIndex) {
                        item.classList.add("is-selected");
                        item.scrollIntoView({ block: "nearest" });
                    } else {
                        item.classList.remove("is-selected");
                    }
                });
            }

            let toastTimer = null;
            function showComingSoonToast(featureName) {
                const toast = document.getElementById("toast-notification");
                if (!toast) return;
                toast.innerHTML = `
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color: #30d158;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span><strong>${featureName}</strong> will be available soon</span>
                `;
                toast.classList.add("is-visible");
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove("is-visible");
                }, 2800);
            }

            document.querySelectorAll("[data-coming-soon]").forEach(el => {
                el.addEventListener("click", (e) => {
                    e.preventDefault();
                    const name = el.getAttribute("data-coming-soon");
                    showComingSoonToast(name);
                });
            });
        });
    </script>
</body>

</html>
