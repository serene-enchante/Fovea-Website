<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Maps Tile View - ECBC</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/cards.css">
    <link rel="stylesheet" href="/styles/maps-components.css">
    <link rel="stylesheet" href="/styles/page-maps-tile.css">
    
    <!-- Leaflet & Fonts -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/logo-fav.png">
</head>
<body class="page-maps-tile">
    <!-- Top Site Header -->
    <header class="intro-header intro-header--lean">
        <a href="/" class="home-link" aria-label="Go to homepage">
            <img src="/images/logo-small.png" alt="ECBC Home" class="logo logo--header">
        </a>
    </header>

    <!-- Main Tile View Interface -->
    <main class="maps-tile-main">
        <!-- Header Row (Specification section 1) -->
        <div class="maps-tile-header">
            <div class="maps-tile-header__left">
                <h1 id="header-title" class="maps-tile-header__title">Loading...</h1>
            </div>

            <!-- Action Icon Buttons -->
            <div class="maps-tile-header__actions">
                <!-- Copy Link -->
                <button type="button" id="btn-copy-link" class="action-icon-btn" aria-label="Copy link to current item" title="Copy link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                    <span>Copy Link</span>
                </button>

                <!-- Download Files -->
                <button type="button" id="btn-download-files" class="action-icon-btn" aria-label="Download files for current item" title="Download files">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span>Download</span>
                </button>

                <!-- Edit Item -->
                <button type="button" id="btn-edit-item" class="action-icon-btn" aria-label="Edit current item" title="Edit item">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    <span>Edit</span>
                </button>
            </div>
        </div>

        <!-- Content Row (Specification section 2) -->
        <div class="maps-tile-content">
            <!-- Left 1/4 of width: List of items with independent scrollbox -->
            <aside class="maps-tile-sidebar" aria-label="Zone list sidebar">
                <div class="maps-tile-sidebar__header" id="sidebar-header">
                    <div id="sidebar-capsules-wrapper" class="sidebar-capsules-wrapper">
                        <div class="sidebar-capsules-scroll">
                            <button class="sidebar-capsule is-active">Circle Zones</button>
                        </div>
                        <button id="btn-search-toggle" class="sidebar-search-toggle-btn" aria-label="Search zones">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="sidebar-search-expanded" class="sidebar-search-expanded">
                        <div class="sidebar-search-input-container">
                            <svg class="sidebar-search-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="sidebar-search-input" class="sidebar-search-input" placeholder="Search zones..." autocomplete="off" />
                        </div>
                        <button id="btn-search-close" class="sidebar-search-close-btn" aria-label="Close search">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="sidebar-zone-list" class="maps-tile-sidebar__scroll">
                    <!-- Zone items generated by JavaScript -->
                </div>
            </aside>

            <!-- Right 3/4 of width: Leaflet window area with margins on all sides -->
            <div class="maps-tile-map-area">
                <section id="map-wrapper" class="maps-tile-map-container" aria-label="Interactive map view">
                    <div id="tile-map">
                        <div class="map-fade-overlay"></div>
                    </div>
                    <span class="map-fullscreen-hint">Double click to enter fullscreen</span>

                    <!-- Download Modal Inside Map Frame -->
                    <div id="downloads-modal" class="modal maps-tile-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="downloads-title">
                        <div class="modal__backdrop" data-modal-close="downloads-modal"></div>
                        <div class="modal__panel maps-tile-modal__panel">
                            <div class="maps-tile-modal__header">
                                <h2 id="downloads-title" class="maps-tile-modal__title">Download Map Data</h2>
                                <button type="button" class="modal__close maps-tile-modal__close" aria-label="Close download modal" data-modal-close="downloads-modal">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>

                            <div class="download-grid maps-tile-download-grid">
                                <section class="download-column maps-tile-download-col" aria-labelledby="vector-title">
                                    <h3 id="vector-title" class="maps-tile-download-col__title">Vector Formats</h3>
                                    <div class="maps-tile-download-list">
                                        <a href="/maps/ecbc-circle-2010.geojson" download="ecbc-circle-2010.geojson" class="download-link maps-tile-download-item is-active" id="download-geojson">
                                            <span>GeoJSON</span>
                                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                                <polyline points="7 10 12 15 17 10"></polyline>
                                                <line x1="12" y1="15" x2="12" y2="3"></line>
                                            </svg>
                                        </a>
                                        <div class="download-link maps-tile-download-item is-disabled">
                                            <span>KMZ (GIS)</span>
                                            <span class="maps-tile-download-tag">Soon</span>
                                        </div>
                                        <div class="download-link maps-tile-download-item is-disabled">
                                            <span>GPX (GPS)</span>
                                            <span class="maps-tile-download-tag">Soon</span>
                                        </div>
                                    </div>
                                </section>

                                <section class="download-column maps-tile-download-col" aria-labelledby="raster-title">
                                    <h3 id="raster-title" class="maps-tile-download-col__title">Raster Formats</h3>
                                    <div class="maps-tile-download-list">
                                        <div class="download-link maps-tile-download-item is-disabled">
                                            <span>GeoPDF</span>
                                            <span class="maps-tile-download-tag">Soon</span>
                                        </div>
                                        <div class="download-link maps-tile-download-item is-disabled">
                                            <span>GeoTIFF</span>
                                            <span class="maps-tile-download-tag">Soon</span>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/scripts/maps-tile.js"></script>
</body>
</html>
